services:
  client_jenkins:
    image: node:20-alpine
    container_name: divi_client_jenkins
    working_dir: /workspace/client
    volumes:
      - ./:/workspace
      - client_node_modules:/workspace/client/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_URL: http://51.20.137.175:5002/api
    ports:
      - "3001:5173"
    depends_on:
      - app_jenkins
    restart: always

  app_jenkins:
    image: node:20-alpine
    container_name: divi_app_jenkins
    working_dir: /workspace/server
    volumes:
      - ./:/workspace
      - server_node_modules:/workspace/server/node_modules
    command: sh -c "npm ci && npm start"
    environment:
      PORT: 5000
      DB_HOST: db_jenkins
      DB_PORT: 5432
      DB_NAME: divi_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      CORS_ORIGIN: http://51.20.137.175:3001
    ports:
      - "5002:5000"
    depends_on:
      - db_jenkins
    restart: always

  db_jenkins:
    image: postgres:15
    container_name: divi_db_jenkins
    environment:
      POSTGRES_DB: divi_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_jenkins:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: always

volumes:
  client_node_modules:
  server_node_modules:
  postgres_data_jenkins: