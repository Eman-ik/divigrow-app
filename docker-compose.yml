services:
  app:
    build:
      context: ./server
    container_name: divi_app_server
    ports:
      - "5001:5000"
    environment:
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: divi_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      CORS_ORIGIN: http://localhost:5173
      DEMO_USERNAME: divi
      DEMO_PASSWORD: divi123
      AUTH_TOKEN: divigrow-demo-token
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15
    container_name: divi_app_db
    environment:
      POSTGRES_DB: divi_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: always

volumes:
  postgres_data: